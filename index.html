<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cuenta regresiva</title>

  <!-- Tipografía bonita -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      color: white;
      text-align: center;

      background-image: url("https://images.unsplash.com/photo-1501973801540-537f08ccae7b");
      background-size: cover;
      background-position: center;
    }

    .overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(to top, rgba(0,0,0,0.6), rgba(0,0,0,0.2));
      backdrop-filter: blur(2px);
    }

    .container {
      position: relative;
      z-index: 2;
      padding: 20px;
      border-radius: 20px;
    }

    h1 {
      font-weight: 300;
      font-size: 2.2rem;
      margin-bottom: 10px;
    }

    .mensaje {
      font-size: 1.1rem;
      margin-bottom: 20px;
      opacity: 0.9;
    }

    #countdown {
      font-size: 2.3rem;
      font-weight: 500;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      font-size: 0.9rem;
      cursor: pointer;
      background: rgba(255,255,255,0.85);
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* brillo suave */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(255,140,0,0.3), transparent);
      border-radius: 50%;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      filter: blur(60px);
      z-index: 1;
    }

  </style>
</head>

<body>

<div class="overlay"></div>
<div class="glow"></div>

<div class="container">
  <h1>Cuenta regresiva ☀️</h1>
  <div class="mensaje">Faltan días para nuestro momento 🧡</div>
  <div id="countdown">Cargando...</div>
  <button onclick="playMusic()">Reproducir música 🎵</button>
</div>

<audio id="music" loop>
  <source src="golden-hour.mp3" type="audio/mpeg">
</audio>

<script>
  const targetDate = new Date("June 4, 2026 15:00:00").getTime();
  const countdown = document.getElementById("countdown");

  setInterval(() => {
    const now = new Date().getTime();
    const distance = targetDate - now;

    if (distance < 0) {
      countdown.innerHTML = "Llegó el momento 🧡✨";
      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);
    const seconds = Math.floor((distance / 1000) % 60);

    countdown.innerHTML =
      `${days}d ${hours}h ${minutes}m ${seconds}s`;
  }, 1000);

  function playMusic() {
    document.getElementById("music").play();
  }

  window.onload = () => {
    document.getElementById("music").play().catch(() => {});
  };
</script>

</body>
</html>
